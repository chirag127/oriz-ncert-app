name: Daily NCERT Scrape

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh all data'
        required: false
        default: false
        type: boolean

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run scraper
        run: pnpm scrape
        env:
          OUTPUT_DIR: ./data/chapters
          FORCE_REFRESH: ${{ github.event.inputs.force || false }}

      - name: Merge PDFs
        run: pnpm merge:pdfs
        env:
          CHAPTERS_DIR: ./data/chapters
          OUTPUT_DIR: ./data/merged

      - name: Generate metadata
        run: pnpm generate:metadata
        env:
          DATA_DIR: ./data

      - name: Generate search index
        run: pnpm generate:search
        env:
          METADATA_DIR: ./data/metadata
          OUTPUT_DIR: ./data/search-index

      - name: Sync to Firebase
        if: env.FIREBASE_PROJECT_ID
        run: pnpm sync:firebase
        env:
          DATA_DIR: ./data
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "bot@ncert-library.org"
          git config --local user.name "NCERT Library Bot"
          git commit -m "chore: daily NCERT data update [skip ci]"
          git push
